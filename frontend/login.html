<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Voley Diloz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">
    <main class="container py-4">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-md-8 col-lg-4">
                <div class="card login-card shadow-sm">
                    <div class="card-body p-4 p-lg-5">
                        <div class="text-center mb-4">
                            <span class="badge text-bg-primary px-3 py-2 mb-3">Sistema de reservas</span>
                            <h1 class="h3 mb-2">Voley Diloz</h1>
                            <p class="text-muted mb-0">Ingrese con su usuario administrador.</p>
                        </div>

                        <div id="mensaje"></div>

                        <form id="formLogin" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label">Usuario</label>
                                <input type="text" id="username" class="form-control" autocomplete="username" required>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">Contrasena</label>
                                <input type="password" id="password" class="form-control" autocomplete="current-password" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Ingresar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
