    <!-- dashboard.html -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Voley Diloz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar p-3 text-white">

        <h4 class="text-center mb-4">VOLEY DILOZ</h4>

        <p id="adminNombre" class="text-center"></p>

        <a href="dashboard.html" class="menu-link">Dashboard</a>
        <a href="clientes.html" class="menu-link">Clientes</a>
        <a href="reservas.html" class="menu-link">Reservas</a>
        <a href="#" onclick="cerrarSesion()" class="menu-link">Salir</a>

    </div>

    <!-- Contenido -->
    <div class="contenido p-4 w-100">

        <h2 class="mb-4">Dashboard Principal</h2>

        <div class="row">

            <div class="col-md-3">
                <div class="card text-center shadow mb-3">
                    <div class="card-body">
                        <h5>Clientes</h5>
                        <h3 id="totalClientes">0</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-center shadow mb-3">
                    <div class="card-body">
                        <h5>Reservas</h5>
                        <h3 id="totalReservas">0</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-center shadow mb-3">
                    <div class="card-body">
                        <h5>Canchas</h5>
                        <h3 id="totalCanchas">0</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-center shadow mb-3">
                    <div class="card-body">
                        <h5>Pagos</h5>
                        <h3 id="totalPagos">0</h3>
                    </div>
                </div>
            </div>

        </div>

        <hr>

        <h4>Reporte de Reservas</h4>

        <table class="table table-bordered mt-3">
            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Cancha</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tablaReporte"></tbody>
        </table>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
