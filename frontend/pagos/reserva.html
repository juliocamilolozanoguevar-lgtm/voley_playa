<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voley Playa | Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-white">

    <div class="container mt-5">
        <h2 class="text-info mb-4"><i class="fas fa-calendar-check"></i> Nueva Reserva</h2>

        <div class="card bg-secondary text-white mb-4 border-info">
            <div class="card-body">
                <form id="reservaForm" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Cliente</label>
                        <select id="selectCliente" class="form-select bg-dark text-white border-0" required>
                            <option value="">Seleccione cliente...</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Cancha</label>
                        <select id="selectCancha" class="form-select bg-dark text-white border-0" required>
                            <option value="">Seleccione cancha...</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Fecha</label>
                        <input type="date" id="fecha" class="form-control bg-dark text-white border-0" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Hora Inicio</label>
                        <input type="time" id="horaInicio" class="form-control bg-dark text-white border-0" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Hora Fin</label>
                        <input type="time" id="horaFin" class="form-control bg-dark text-white border-0" required>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-info w-100 fw-bold">CREAR RESERVA</button>
                    </div>
                </form>
            </div>
        </div>

        <h4 class="mt-5 text-info">Calendario de Reservas</h4>
        <div class="table-responsive mt-3">
            <table class="table table-dark table-striped border-info">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Cliente</th>
                        <th>Cancha</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaReservas">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="js/reservas.js"></script>
</body>
</html>
