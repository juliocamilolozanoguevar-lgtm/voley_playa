<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="voley-api-origin" content="http://localhost:8080">
  <title>Diagnóstico API - Voley Playa</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { padding: 20px; }
    .test-pass { background-color: #d4edda; border-color: #28a745; }
    .test-fail { background-color: #f8d7da; border-color: #dc3545; }
    .test-pending { background-color: #fff3cd; border-color: #ffc107; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Diagnóstico de Conexión - Voley Playa</h1>
    
    <div id="tests" class="mb-4"></div>
    
    <button class="btn btn-primary" onclick="location.reload()">Reintentar</button>
    <a href="index.html" class="btn btn-secondary">Volver</a>
  </div>

  <script src="js/api-config.js"></script>
  <script>
    const testsContainer = document.getElementById('tests');
    const results = [];

    async function runTest(name, fn) {
      const div = document.createElement('div');
      div.className = 'alert test-pending';
      div.innerHTML = `<strong>${name}</strong>: Cargando...`;
      testsContainer.appendChild(div);

      try {
        await fn();
        div.className = 'alert alert-success test-pass';
        div.innerHTML = `<strong>${name}</strong>: ✓ OK`;
        results.push({ name, status: 'pass' });
      } catch (error) {
        div.className = 'alert alert-danger test-fail';
        div.innerHTML = `<strong>${name}</strong>: ✗ ${error.message}`;
        results.push({ name, status: 'fail', error: error.message });
      }
    }

    async function main() {
      console.log('API Origin:', window.VoleyApi.origin);
      console.log('Base URL:', window.VoleyApi.baseUrl);

      await runTest('Health Check', async () => {
        await window.VoleyApi.fetchJson('/health');
      });

      await runTest('GET /clientes', async () => {
        const clientes = await window.VoleyApi.fetchJson('/clientes');
        if (!Array.isArray(clientes)) throw new Error('No es un array');
      });

      await runTest('GET /canchas', async () => {
        const canchas = await window.VoleyApi.fetchJson('/canchas');
        if (!Array.isArray(canchas)) throw new Error('No es un array');
      });

      await runTest('GET /reservas', async () => {
        const reservas = await window.VoleyApi.fetchJson('/reservas');
        if (!Array.isArray(reservas)) throw new Error('No es un array');
      });

      const testClienteId = Math.floor(Math.random() * 1000000);
      const testDni = String(testClienteId).padStart(8, '0');

      await runTest('POST /clientes', async () => {
        const response = await window.VoleyApi.fetchJson('/clientes', {
          method: 'POST',
          body: JSON.stringify({
            dni: testDni,
            nombre: 'Test',
            apellido: 'Diagnóstico'
          })
        });
        if (!response.idCliente) throw new Error('Sin idCliente');
        window.testClienteId = response.idCliente;
      });

      await runTest('POST /reservas', async () => {
        if (!window.testClienteId) throw new Error('Sin cliente');
        const today = new Date().toISOString().split('T')[0];
        const response = await window.VoleyApi.fetchJson('/reservas', {
          method: 'POST',
          body: JSON.stringify({
            fecha: today,
            horaInicio: '10:00:00',
            horaFin: '11:00:00',
            clienteDni: testDni,
            clienteNombre: 'Test',
            clienteApellido: 'Diagnóstico',
            canchaId: 1,
            monto: 0,
            estado: 'PENDIENTE'
          })
        });
        if (!response.idReserva) throw new Error('Sin idReserva');
        window.testReservaId = response.idReserva;
      });

      await runTest('PUT /clientes/{id}', async () => {
        if (!window.testClienteId) throw new Error('Sin cliente');
        const response = await window.VoleyApi.fetchJson(`/clientes/${window.testClienteId}`, {
          method: 'PUT',
          body: JSON.stringify({
            dni: testDni,
            nombre: 'TestActualizado',
            apellido: 'Diagnóstico'
          })
        });
        if (!response.idCliente) throw new Error('Sin idCliente');
      });

      await runTest('PUT /reservas/{id}', async () => {
        if (!window.testReservaId) throw new Error('Sin reserva');
        const today = new Date().toISOString().split('T')[0];
        const response = await window.VoleyApi.fetchJson(`/reservas/${window.testReservaId}`, {
          method: 'PUT',
          body: JSON.stringify({
            fecha: today,
            horaInicio: '11:00:00',
            horaFin: '12:00:00',
            clienteDni: testDni,
            clienteNombre: 'Test',
            clienteApellido: 'Diagnóstico',
            canchaId: 1,
            monto: 0,
            estado: 'PAGADO'
          })
        });
        if (!response.idReserva) throw new Error('Sin idReserva');
      });

      await runTest('DELETE /reservas/{id}', async () => {
        if (!window.testReservaId) throw new Error('Sin reserva');
        await window.VoleyApi.fetchJson(`/reservas/${window.testReservaId}`, {
          method: 'DELETE'
        });
      });

      await runTest('DELETE /clientes/{id}', async () => {
        if (!window.testClienteId) throw new Error('Sin cliente');
        await window.VoleyApi.fetchJson(`/clientes/${window.testClienteId}`, {
          method: 'DELETE'
        });
      });

      console.log('Resultados:', results);
    }

    main();
  </script>
</body>
</html>
