<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Voley Playa Diloz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="login-card shadow-lg">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="icon-circle mb-3">
                    <i class="fas fa-volleyball-ball fa-2x text-info"></i>
                </div>
                <h2 class="fw-bold text-white">Voley <span class="text-info">Diloz</span></h2>
                <p class="text-muted">Panel de Administración</p>
            </div>

            <form id="loginForm">
                <div class="mb-4">
                    <label class="form-label text-light small">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="username" class="form-control bg-dark text-white border-secondary" placeholder="Ingresa tu usuario" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-light small">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password" class="form-control bg-dark text-white border-secondary" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-info w-100 fw-bold py-2 mb-3">
                    INGRESAR <i class="fas fa-arrow-right ms-2"></i>
                </button>

                <div id="errorMessage" class="alert alert-danger d-none small p-2 text-center" role="alert">
                    Credenciales incorrectas. Intente de nuevo.
                </div>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
