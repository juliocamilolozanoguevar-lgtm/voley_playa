<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voley Playa Diloz | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card bg-secondary text-white shadow-lg" style="width: 400px; border-radius: 15px; border: 1px solid #0dcaf0;">
        <div class="card-body p-5 text-center">
            <h2 class="fw-bold mb-4 text-info">🏐 Diloz Login</h2>
            <form id="loginForm">
                <div class="mb-3 text-start">
                    <label class="form-label small">Usuario</label>
                    <input type="text" id="username" class="form-control bg-dark text-white border-0" placeholder="admin" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label small">Contraseña</label>
                    <input type="password" id="password" class="form-control bg-dark text-white border-0" placeholder="****" required>
                </div>
                <button type="submit" class="btn btn-info w-100 fw-bold">ENTRAR</button>
            </form>
            <div id="errorMessage" class="text-danger mt-3 d-none">Usuario o clave incorrectos</div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
