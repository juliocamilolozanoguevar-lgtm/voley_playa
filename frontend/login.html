<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="voley-api-origin" content="http://localhost:8080">
  <title>Voley Playa Diloz - Iniciar Sesión</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <!-- Font Awesome para iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/modern.css">
  <style>
    body.login-page {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
  </style>
</head>

<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo">
          <i class="fas fa-volleyball"></i>
        </div>
        <h1>Voley Playa Diloz</h1>
        <p>Sistema de Gestión de Reservas</p>
      </div>
      
      <div class="login-body">
        <form id="loginForm" class="needs-validation" novalidate>
          <div class="form-group">
            <label for="username" class="form-label">
              <i class="fas fa-user me-2"></i>Usuario
            </label>
            <input type="text" class="form-control" id="username" placeholder="Ingresa tu usuario" required>
            <div class="invalid-feedback">Por favor ingresa tu usuario</div>
          </div>
          
          <div class="form-group">
            <label for="password" class="form-label">
              <i class="fas fa-lock me-2"></i>Contraseña
            </label>
            <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña" required>
            <div class="invalid-feedback">Por favor ingresa tu contraseña</div>
          </div>
          
          <div id="errorMessage" class="login-error d-none" role="alert"></div>
          
          <button type="submit" class="login-button" id="loginButton">
            <i class="fas fa-sign-in-alt me-2"></i>Ingresar al sistema
          </button>
        </form>
        
        <div class="text-center mt-4 text-muted" style="font-size: 0.875rem;">
          <p>Credenciales de prueba:<br><strong>usuario: admin</strong> | <strong>contraseña: diloz_2024</strong></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
