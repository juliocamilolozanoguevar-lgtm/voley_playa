<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="voley-api-origin" content="http://localhost:8080">
  <title>Test API - Voley Playa</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    .test { margin: 15px 0; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    .pass { background: #d4edda; border-color: #28a745; }
    .fail { background: #f8d7da; border-color: #dc3545; }
    .pending { background: #fff3cd; border-color: #ffc107; }
    button { padding: 8px 12px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Diagnóstico API - Voley Playa</h1>
    
    <div id="tests"></div>
    
    <button onclick="location.reload()">Reintentar</button>
  </div>

  <script src="js/api-config.js"></script>
  <script>
    const tests = document.getElementById('tests');

    async function runTest(name, fn) {
      const div = document.createElement('div');
      div.className = 'test pending';
      div.innerHTML = `<strong>${name}</strong>: Cargando...`;
      tests.appendChild(div);

      try {
        await fn();
        div.className = 'test pass';
        div.innerHTML = `<strong>${name}</strong>: ✓ OK`;
      } catch (error) {
        div.className = 'test fail';
        div.innerHTML = `<strong>${name}</strong>: ✗ ${error.message}`;
      }
    }

    async function main() {
      // Test 1: Health check
      await runTest('Health Check', async () => {
        const response = await window.VoleyApi.fetchJson('/health');
        if (!response) throw new Error('No response');
      });

      // Test 2: Get Clientes
      await runTest('GET /clientes', async () => {
        const clientes = await window.VoleyApi.fetchJson('/clientes');
        if (!Array.isArray(clientes)) throw new Error('Response is not an array');
      });

      // Test 3: Get Canchas
      await runTest('GET /canchas', async () => {
        const canchas = await window.VoleyApi.fetchJson('/canchas');
        if (!Array.isArray(canchas)) throw new Error('Response is not an array');
      });

      // Test 4: Get Reservas
      await runTest('GET /reservas', async () => {
        const reservas = await window.VoleyApi.fetchJson('/reservas');
        if (!Array.isArray(reservas)) throw new Error('Response is not an array');
      });

      // Test 5: Create Cliente
      await runTest('POST /clientes (create)', async () => {
        const cliente = {
          dni: '99999999',
          nombre: 'Test',
          apellido: 'Temporal'
        };
        const response = await window.VoleyApi.fetchJson('/clientes', {
          method: 'POST',
          body: JSON.stringify(cliente)
        });
        if (!response.idCliente) throw new Error('No idCliente in response');
        window.testClienteId = response.idCliente;
      });

      // Test 6: Create Reserva
      await runTest('POST /reservas (create)', async () => {
        if (!window.testClienteId) throw new Error('No test cliente created');
        const reserva = {
          fecha: new Date().toISOString().split('T')[0],
          horaInicio: '10:00:00',
          horaFin: '11:00:00',
          clienteDni: '99999999',
          clienteNombre: 'Test',
          clienteApellido: 'Temporal',
          canchaId: 1,
          monto: 0,
          estado: 'PENDIENTE'
        };
        const response = await window.VoleyApi.fetchJson('/reservas', {
          method: 'POST',
          body: JSON.stringify(reserva)
        });
        if (!response.idReserva) throw new Error('No idReserva in response');
        window.testReservaId = response.idReserva;
      });

      // Test 7: Update Cliente
      await runTest('PUT /clientes/{id} (update)', async () => {
        if (!window.testClienteId) throw new Error('No test cliente');
        const cliente = {
          dni: '99999999',
          nombre: 'TestActualizado',
          apellido: 'Temporal'
        };
        const response = await window.VoleyApi.fetchJson(`/clientes/${window.testClienteId}`, {
          method: 'PUT',
          body: JSON.stringify(cliente)
        });
        if (!response.idCliente) throw new Error('No idCliente in response');
      });

      // Test 8: Update Reserva
      await runTest('PUT /reservas/{id} (update)', async () => {
        if (!window.testReservaId) throw new Error('No test reserva');
        const reserva = {
          fecha: new Date().toISOString().split('T')[0],
          horaInicio: '11:00:00',
          horaFin: '12:00:00',
          clienteDni: '99999999',
          clienteNombre: 'Test',
          clienteApellido: 'Temporal',
          canchaId: 1,
          monto: 0,
          estado: 'PAGADO'
        };
        const response = await window.VoleyApi.fetchJson(`/reservas/${window.testReservaId}`, {
          method: 'PUT',
          body: JSON.stringify(reserva)
        });
        if (!response.idReserva) throw new Error('No idReserva in response');
      });

      // Test 9: Delete Reserva
      await runTest('DELETE /reservas/{id} (delete)', async () => {
        if (!window.testReservaId) throw new Error('No test reserva');
        await window.VoleyApi.fetchJson(`/reservas/${window.testReservaId}`, {
          method: 'DELETE'
        });
      });

      // Test 10: Delete Cliente
      await runTest('DELETE /clientes/{id} (delete)', async () => {
        if (!window.testClienteId) throw new Error('No test cliente');
        await window.VoleyApi.fetchJson(`/clientes/${window.testClienteId}`, {
          method: 'DELETE'
        });
      });
    }

    main();
  </script>
</body>
</html>
