<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Voley Diloz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-body">
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">Voley Diloz</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Alternar navegacion">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="reservas.html">Reservas</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <span class="navbar-text text-white" id="nombreAdmin">Administrador</span>
                    <button type="button" class="btn btn-light btn-sm" onclick="cerrarSesion()">Salir</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="page-wrapper">
        <div class="container">
            <div class="mb-4">
                <h1 class="page-title">Dashboard</h1>
                <p class="helper-text mb-0">Resumen general del sistema conectado a la base de datos.</p>
            </div>

            <div id="mensajeDashboard"></div>

            <div class="row g-3 mb-4">
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card summary-card h-100">
                        <div class="card-body">
                            <p class="summary-label">Clientes</p>
                            <p class="summary-value" id="totalClientes">0</p>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card summary-card h-100">
                        <div class="card-body">
                            <p class="summary-label">Reservas</p>
                            <p class="summary-value" id="totalReservas">0</p>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card summary-card h-100">
                        <div class="card-body">
                            <p class="summary-label">Canchas</p>
                            <p class="summary-value" id="totalCanchas">0</p>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card summary-card h-100">
                        <div class="card-body">
                            <p class="summary-label">Pagos</p>
                            <p class="summary-value" id="totalPagos">0</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card section-card">
                <div class="card-header">Reservas registradas</div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Cliente</th>
                                    <th>Cancha</th>
                                    <th>Fecha</th>
                                    <th>Horario</th>
                                    <th>Pago</th>
                                </tr>
                            </thead>
                            <tbody id="tablaReporte"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
