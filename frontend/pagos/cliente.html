<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diloz Admin | Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/cliente.css">
</head>
<body class="d-flex">

    <aside class="sidebar shadow-lg">
        <div class="brand p-4 text-center">
            <h3 class="text-info fw-bold mb-0">Diloz Admin</h3>
            <small class="text-white-50 text-uppercase" style="font-size: 10px;">Gestión Deportiva</small>
        </div>

        <nav class="nav-menu flex-grow-1 mt-3">
            <a href="../dashboard.html" class="nav-item"><i class="fas fa-th-large me-2"></i> <span>Dashboard</span></a>
            <a href="cliente.html" class="nav-item active"><i class="fas fa-users me-2"></i> <span>Clientes</span></a>
            <a href="reserva.html" class="nav-item"><i class="fas fa-calendar-alt me-2"></i> <span>Reservas</span></a>
        </nav>

        <div class="p-4 border-top border-secondary">
            <a href="#" class="logout-link" onclick="logout()"><i class="fas fa-power-off me-2"></i> <span>Cerrar Sesión</span></a>
        </div>
    </aside>

    <main class="content-wrapper">
        <header class="main-header d-flex justify-content-between align-items-center p-3">
            <h4 class="text-white mb-0">Panel de Clientes</h4>
            <div class="user-profile bg-info px-3 py-1 rounded-pill d-flex align-items-center">
                <i class="fas fa-user-circle me-2 text-dark"></i>
                <span class="text-dark fw-bold small">Admin Principal</span>
            </div>
        </header>

        <div class="container-fluid p-4">
            
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="kpi-card">
                        <span class="label">Ingresos del Mes</span>
                        <h2 class="text-white mb-0">S/. 1,500</h2>
                        <i class="fas fa-dollar-sign icon text-info"></i>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="kpi-card">
                        <span class="label">Reservas Hoy</span>
                        <h2 class="text-white mb-0">10</h2>
                        <i class="fas fa-check-circle icon text-success"></i>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="kpi-card">
                        <span class="label">Canchas Activas</span>
                        <h2 class="text-white mb-0">2</h2>
                        <i class="fas fa-futbol icon text-primary"></i>
                    </div>
                </div>
            </div>

            <section class="table-section">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="text-info mb-0">Gestión de Reservas Detallada</h5>
                    <button class="btn btn-info btn-sm fw-bold px-3">
                        <i class="fas fa-plus me-2"></i>Nueva Reserva
                    </button>
                </div>

                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle m-0">
                        <thead>
                            <tr class="text-info border-bottom border-secondary">
                                <th>DNI</th>
                                <th>Apellidos y Nombres</th>
                                <th>Reserva</th>
                                <th>Estado de Pago</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyReservas">
                            </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
