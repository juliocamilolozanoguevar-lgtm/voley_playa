<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes | Voley Diloz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-body">
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">Voley Diloz</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Alternar navegacion">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="reservas.html">Reservas</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <span class="navbar-text text-white" id="nombreAdmin">Administrador</span>
                    <button type="button" class="btn btn-light btn-sm" onclick="cerrarSesion()">Salir</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="page-wrapper">
        <div class="container">
            <div class="mb-4">
                <h1 class="page-title">Clientes</h1>
                <p class="helper-text mb-0">Registre y consulte los clientes guardados en la base de datos.</p>
            </div>

            <div id="mensajeCliente"></div>

            <div class="card section-card mb-4">
                <div class="card-header">Nuevo cliente</div>
                <div class="card-body">
                    <form id="formCliente" novalidate>
                        <div class="row g-3">
                            <div class="col-12 col-md-4">
                                <label for="dni" class="form-label">DNI</label>
                                <input type="text" id="dni" class="form-control" maxlength="8" inputmode="numeric">
                            </div>
                            <div class="col-12 col-md-4">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" id="nombre" class="form-control">
                            </div>
                            <div class="col-12 col-md-4">
                                <label for="apellido" class="form-label">Apellido</label>
                                <input type="text" id="apellido" class="form-control">
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">Guardar cliente</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card section-card">
                <div class="card-header">Listado de clientes</div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>DNI</th>
                                    <th>Nombre</th>
                                    <th>Apellido</th>
                                </tr>
                            </thead>
                            <tbody id="tablaClientes"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/clientes.js"></script>
</body>
</html>
