<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas | Voley Diloz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-body">
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">Voley Diloz</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Alternar navegacion">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="reservas.html">Reservas</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <span class="navbar-text text-white" id="nombreAdmin">Administrador</span>
                    <button type="button" class="btn btn-light btn-sm" onclick="cerrarSesion()">Salir</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="page-wrapper">
        <div class="container">
            <div class="mb-4">
                <h1 class="page-title">Reservas</h1>
                <p class="helper-text mb-0">Cree reservas nuevas y consulte la informacion guardada en la base de datos.</p>
            </div>

            <div id="mensajeReserva"></div>

            <div class="card section-card mb-4">
                <div class="card-header">Nueva reserva</div>
                <div class="card-body">
                    <form id="formReserva" novalidate>
                        <div class="row g-3">
                            <div class="col-12 col-lg-4">
                                <label for="clienteId" class="form-label">Cliente</label>
                                <select id="clienteId" class="form-select"></select>
                            </div>
                            <div class="col-12 col-lg-4">
                                <label for="canchaId" class="form-label">Cancha</label>
                                <select id="canchaId" class="form-select"></select>
                            </div>
                            <div class="col-12 col-md-4 col-lg-2">
                                <label for="fecha" class="form-label">Fecha</label>
                                <input type="date" id="fecha" class="form-control">
                            </div>
                            <div class="col-6 col-md-4 col-lg-1">
                                <label for="horaInicio" class="form-label">Inicio</label>
                                <input type="time" id="horaInicio" class="form-control">
                            </div>
                            <div class="col-6 col-md-4 col-lg-1">
                                <label for="horaFin" class="form-label">Fin</label>
                                <input type="time" id="horaFin" class="form-control">
                            </div>
                            <div class="col-12 col-md-4 col-lg-2">
                                <label for="monto" class="form-label">Monto (opcional)</label>
                                <input type="number" id="monto" class="form-control" min="0" step="0.01" placeholder="0.00">
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">Guardar reserva</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card section-card">
                <div class="card-header">Listado de reservas</div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Cliente</th>
                                    <th>Cancha</th>
                                    <th>Fecha</th>
                                    <th>Horario</th>
                                    <th>Pago</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaReservas"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/reservas.js"></script>
</body>
</html>
