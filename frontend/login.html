<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- API Spring Boot (BD MySQL); cambia el puerto si tu backend usa otro -->
  <meta name="voley-api-origin" content="http://localhost:8080">
  <title>Voley Playa Diloz | Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">
  <main class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-100 py-4">
      <div class="col-12 col-md-10 col-lg-7 col-xl-5">
        <section class="card border shadow-sm login-card rounded-3">
          <div class="card-body p-4 p-sm-5">
            <div class="d-flex align-items-center gap-3 mb-4">
              <span class="brand-mark">VD</span>
              <div>
                <p class="text-uppercase fw-bold small mb-1 login-kicker">Voley Playa Diloz</p>
                <h1 class="h2 mb-0 fw-bold login-title">Acceso al panel</h1>
              </div>
            </div>

          
            <form id="loginForm" class="row g-3" novalidate>
              <div class="col-12">
                <label for="username" class="form-label fw-semibold">Usuario</label>
                <input type="text" id="username" class="form-control form-control-lg rounded-2" placeholder="User" autocomplete="username" required>
              </div>

              <div class="col-12">
                <label for="password" class="form-label fw-semibold">Contrasena</label>
                <input type="password" id="password" class="form-control form-control-lg rounded-2" placeholder="........" autocomplete="current-password" required>
              </div>

              <div class="col-12 d-grid mt-2">
                <button type="submit" id="loginButton" class="btn btn-primary btn-lg rounded-2 fw-bold">
                  Ingresar al sistema
                </button>
              </div>
              
              <div class="col-12">
                <div id="errorMessage" class="alert alert-danger rounded-2 d-none mb-0" role="alert"></div>
              </div>

              <div class="col-12">
                <p id="backendStatus" class="small text-secondary mb-0 mt-1" aria-live="polite"></p>
              </div>
            </form>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="js/api-config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
