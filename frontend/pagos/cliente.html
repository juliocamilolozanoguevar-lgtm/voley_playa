<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voley Playa | Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-white">

    <div class="container mt-5">
        <h2 class="text-info mb-4"><i class="fas fa-users"></i> Gestión de Clientes</h2>
        
        <div class="card bg-secondary text-white mb-4 border-info">
            <div class="card-body">
                <form id="clienteForm" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">DNI</label>
                        <input type="text" id="dni" class="form-control bg-dark text-white border-0" maxlength="8" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Nombre</label>
                        <input type="text" id="nombre" class="form-control bg-dark text-white border-0" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Apellido</label>
                        <input type="text" id="apellido" class="form-control bg-dark text-white border-0" required>
                    </div>
                    <div class="col-md-1 d-flex align-items-end">
                        <button type="submit" class="btn btn-info w-100"><i class="fas fa-save"></i></button>
                    </div>
                </form>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-dark table-hover border-info">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>DNI</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaClientes">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="js/clientes.js"></script>
</body>
</html>
