<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservas - Voley Diloz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3 text-white">

        <h4 class="text-center mb-4">VOLEY DILOZ</h4>

        <a href="dashboard.html" class="menu-link">Dashboard</a>
        <a href="clientes.html" class="menu-link">Clientes</a>
        <a href="reservas.html" class="menu-link">Reservas</a>
        <a href="login.html" class="menu-link">Salir</a>

    </div>

    <!-- CONTENIDO -->
    <div class="contenido p-4 w-100">

        <h2>Gestión de Reservas</h2>

        <!-- FORMULARIO -->
        <div class="card p-3 mb-4">

            <div class="row">

                <div class="col-md-3">
                    <label>Cliente</label>
                    <select id="cliente" class="form-control"></select>
                </div>

                <div class="col-md-3">
                    <label>Cancha</label>
                    <select id="cancha" class="form-control"></select>
                </div>

                <div class="col-md-2">
                    <label>Fecha</label>
                    <input type="date" id="fecha" class="form-control">
                </div>

                <div class="col-md-2">
                    <label>Inicio</label>
                    <input type="time" id="inicio" class="form-control">
                </div>

                <div class="col-md-2">
                    <label>Fin</label>
                    <input type="time" id="fin" class="form-control">
                </div>

            </div>

            <div class="mt-3">
                <label>Estado</label>
                <select id="estado" class="form-control">
                    <option>PENDIENTE</option>
                    <option>PAGADO</option>
                    <option>ANULADO</option>
                </select>
            </div>

            <button class="btn btn-primary mt-3" onclick="guardarReserva()">
                Guardar Reserva
            </button>

        </div>

        <!-- TABLA -->
        <table class="table table-bordered">
            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Cancha</th>
                    <th>Fecha</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tablaReservas"></tbody>
        </table>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/reservas.js"></script>

</body>
</html>
