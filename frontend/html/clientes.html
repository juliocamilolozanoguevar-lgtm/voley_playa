<!-- clientes.html -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes - Voley Diloz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3 text-white">

        <h4 class="text-center mb-4">VOLEY DILOZ</h4>

        <a href="dashboard.html" class="menu-link">Dashboard</a>
        <a href="clientes.html" class="menu-link">Clientes</a>
        <a href="reservas.html" class="menu-link">Reservas</a>
        <a href="login.html" class="menu-link">Salir</a>

    </div>

    <!-- CONTENIDO -->
    <div class="contenido p-4 w-100">

        <h2>Gestión de Clientes</h2>

        <!-- FORMULARIO -->
        <div class="card p-3 mb-4">

            <h5>Registrar Cliente</h5>

            <div class="row">

                <div class="col-md-3">
                    <input type="text" id="dni" class="form-control" placeholder="DNI">
                </div>

                <div class="col-md-3">
                    <input type="text" id="nombre" class="form-control" placeholder="Nombre">
                </div>

                <div class="col-md-3">
                    <input type="text" id="apellido" class="form-control" placeholder="Apellido">
                </div>

                <div class="col-md-3">
                    <input type="text" id="celular" class="form-control" placeholder="Celular">
                </div>

            </div>

            <button class="btn btn-primary mt-3" onclick="guardarCliente()">
                Guardar
            </button>

        </div>

        <!-- TABLA -->
        <table class="table table-bordered">
            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>DNI</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Celular</th>
                </tr>
            </thead>

            <tbody id="tablaClientes"></tbody>
        </table>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/clientes.js"></script>

</body>
</html>
