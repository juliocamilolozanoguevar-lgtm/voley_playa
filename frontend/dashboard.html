<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voley Playa Diloz - Dashboard</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <!-- Font Awesome para iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/modern.css">
</head>

<body>
  <div class="d-flex" id="wrapper">
    <!-- Sidebar -->
    <div class="bg-primary-subtle border-end" id="sidebar-wrapper">
      <div class="sidebar-heading text-primary bg-primary-subtle border-bottom p-3">
        <i class="fa-solid fa-volleyball me-2"></i> Voley Playa Diloz
      </div>
      <div class="list-group list-group-flush">
        <a class="list-group-item list-group-item-action list-group-item-light p-3 menu-link" href="dashboard.html">
          <i class="fa-solid fa-chart-line me-2"></i> Dashboard
        </a>
        <a class="list-group-item list-group-item-action list-group-item-light p-3 menu-link" href="clientes.html">
          <i class="fa-solid fa-users me-2"></i> Clientes
        </a>
        <a class="list-group-item list-group-item-action list-group-item-light p-3 menu-link" href="reservas.html">
          <i class="fa-solid fa-calendar-alt me-2"></i> Reservas
        </a>
        <button class="list-group-item list-group-item-action list-group-item-light p-3" data-logout>
          <i class="fa-solid fa-sign-out-alt me-2"></i> Cerrar Sesión
        </button>
      </div>
    </div>
    <!-- Page content wrapper -->
    <div id="page-content-wrapper">
      <!-- Top navigation -->
      <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container-fluid">
          <button class="btn btn-primary" id="sidebarToggle">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="d-flex align-items-center">
            <span class="navbar-text me-3">Bienvenido, <strong data-username>Administrador</strong></span>
          </div>
        </div>
      </nav>
      <!-- Page content -->
      <div class="container-fluid py-4">
        <h1 class="mb-4">Dashboard</h1>
        <div id="dashboardAlert" class="alert d-none app-alert rounded-4" role="alert"></div>

        <!-- Tabs para Dashboard y Reportes -->
        <ul class="nav nav-tabs mb-4" id="dashboardTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="overview-tab" data-bs-toggle="tab" data-bs-target="#overview"
              type="button" role="tab" aria-controls="overview" aria-selected="true">Vista General</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="reportes-tab" data-bs-toggle="tab" data-bs-target="#reportes" type="button"
              role="tab" aria-controls="reportes" aria-selected="false" data-tab-name="reportes">Reportes</button>
          </li>
        </ul>

        <!-- Contenido de las Tabs -->
        <div class="tab-content" id="dashboardTabsContent">
          <!-- Vista General del Dashboard -->
          <div class="tab-pane fade show active" id="overview" role="tabpanel" aria-labelledby="overview-tab">
            <div class="row g-4">
              <div class="col-md-3">
                <div class="card text-bg-primary shadow-sm rounded-4">
                  <div class="card-body">
                    <h5 class="card-title">Ingresos Hoy</h5>
                    <p class="card-text fs-3" id="ingresosHoy">S/. 0.00</p>
                  </div>
                </div>
              </div>
              <div class="col-md-3">
                <div class="card text-bg-success shadow-sm rounded-4">
                  <div class="card-body">
                    <h5 class="card-title">Reservas Hoy</h5>
                    <p class="card-text fs-3" id="totalReservasHoy">0</p>
                  </div>
                </div>
              </div>
              <div class="col-md-3">
                <div class="card text-bg-info shadow-sm rounded-4">
                  <div class="card-body">
                    <h5 class="card
